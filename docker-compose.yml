version: '3.8'

# This is the main Docker Compose file for Ninja OS
# It's a simplified version for quick local deployment

services:
  # NocoBase - Data and UI Layer
  nocobase:
    image: nocobase/nocobase:latest
    restart: unless-stopped
    ports:
      - "12000:13000"
    environment:
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=nocobase
      - DB_USER=nocobase
      - DB_PASSWORD=nocobase
      - LOCAL_STORAGE_DEST=/app/storage
      - APP_PORT=13000
      - API_BASE_PATH=/api/
      - INIT_ROOT_EMAIL=admin@ninjaos.com
      - INIT_ROOT_PASSWORD=NinjaAdmin123
      - INIT_ROOT_NICKNAME=Ninja Admin
      - PLUGINS=hvac-plugin
    volumes:
      - nocobase_data:/app/storage
      - ./plugins:/app/plugins
    depends_on:
      - postgres
    networks:
      - ninja_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # n8n - Workflow Engine
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "12001:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=n8n
      - N8N_EDITOR_BASE_URL=http://localhost:12001
      - N8N_ENCRYPTION_KEY=ninjaos-encryption-key
      - N8N_AUTH_ENABLED=true
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=NinjaAdmin123
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - ninja_network

  # Database - PostgreSQL
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_MULTIPLE_DATABASES=nocobase,n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - ninja_network

  # API Gateway - Integration Layer
  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - nocobase
      - n8n
    networks:
      - ninja_network

volumes:
  postgres_data:
  nocobase_data:
  n8n_data:

networks:
  ninja_network:
    driver: bridge